<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title>Registrer resultat - DeckForge</title>
</head>
<body>

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main>
    <section class="profile-card">
        <h1>Registrer resultat</h1>
        <p th:text="${event.title}">Eventnavn</p>

        <p class="event-decks-message" th:if="${error}" th:text="${error}">Fejl</p>

        <form th:action="@{/events/{id}/result(id=${event.id})}" method="post" class="event-form">

            <div class="event-form-row">
                <label for="winnerUserAccountId">Vinder</label>
                <select id="winnerUserAccountId" name="winnerUserAccountId" required>
                    <option value="">Vælg vinder</option>
                    <option th:each="registration : ${registrations}"
                            th:value="${registration.userAccountId}"
                            th:text="${registration.displayName}">
                        Spillernavn
                    </option>
                </select>
            </div>

            <div class="profile-actions">
                <button class="btn profile-btn" type="submit">Gem resultat</button>
                <a class="btn profile-btn" th:href="@{/events/{id}(id=${event.id})}">Tilbage</a>
            </div>

        </form>

        <section class="profile-details" th:if="${result != null}">
            <div class="profile-detail">
                <span class="profile-detail-label">Nuværende vinder</span>
                <span class="profile-detail-value" th:text="${result.winnerDisplayName}">Vinder</span>
            </div>
        </section>
    </section>
</main>

</body>
</html>
