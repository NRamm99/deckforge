<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/trade/trade.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title th:text="'Trade #' + ${trade.id} + ' - DeckForge'">Trade - DeckForge</title>
</head>
<body>

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main>
    <section class="profile-card">
        <div class="trade-header">
            <div>
                <h1 th:text="'Trade #' + ${trade.id}">Trade #1</h1>
                <p th:text="'Oprettet af user #' + ${trade.creatorUserId}">Oprettet af user #1</p>
                <p th:text="'Status: ' + ${trade.status}">Status: OPEN</p>
                <p th:if="${success}" th:text="${success}"></p>
                <p th:if="${error}" th:text="${error}"></p>
            </div>

            <div class="trade-header-actions">
                <form th:if="${ownTrade and openTrade}" th:action="@{/trades/{id}/cancel(id=${trade.id})}" method="post">
                    <button class="btn deck-delete-btn" type="submit">Annuller</button>
                </form>
                <a class="btn deck-view-btn" th:href="@{/trades}">Tilbage</a>
            </div>
        </div>

        <div class="trade-items">
            <strong>Trade tilbyder:</strong>
            <span th:each="cc,iter : ${trade.offeredCards}"
                  th:text="${cc.quantity} + 'x ' + ${cc.card.name} + (${iter.last} ? '' : ', ')">1x Card</span>
        </div>

        <div th:if="${!ownTrade and openTrade}" class="trade-divider">
            <h2>Send bud</h2>
            <form th:action="@{/trades/{id}/offer(id=${trade.id})}" method="post">
                <div id="offerRows" class="trade-rows">
                    <div class="offer-row trade-row">
                        <div>
                            <label>Kort</label><br>
                            <select name="cardIds" required>
                                <option value="" selected disabled>Vælg kort</option>
                                <option th:each="cc : ${collectionCards}"
                                        th:value="${cc.card.id}"
                                        th:text="${cc.card.name} + ' (du har ' + ${cc.quantity} + ')'">
                                    Card
                                </option>
                            </select>
                        </div>

                        <div>
                            <label>Antal</label><br>
                            <input name="quantities" type="number" min="1" value="1" class="trade-qty-input">
                        </div>

                        <button class="btn deck-delete-btn remove-offer-row" type="button">Fjern</button>
                    </div>
                </div>

                <div class="trade-form-actions">
                    <button id="addOfferRow" class="btn deck-view-btn" type="button">Tilføj række</button>
                    <button type="submit" class="btn profile-btn">Send</button>
                </div>
            </form>
        </div>

        <div class="trade-divider">
            <h2>Bud</h2>

            <div th:if="${#lists.isEmpty(offers)}">
                <p>Ingen bud endnu.</p>
            </div>

            <div th:if="${!#lists.isEmpty(offers)}">
                <article th:each="offer : ${offers}" class="trade-article">
                    <div class="trade-article-header">
                        <div>
                            <div class="trade-muted">
                                <strong th:text="'Offer #' + ${offer.id}">Offer #1</strong>
                                <span th:text="' | Fra user #' + ${offer.offerUserId}"> | Fra user #2</span>
                                <span th:text="' | Status: ' + ${offer.status}"> | Status: PENDING</span>
                            </div>
                            <div class="trade-spacer-top">
                                <strong>Tilbyder:</strong>
                                <span th:each="cc,iter : ${offer.offeredCards}"
                                      th:text="${cc.quantity} + 'x ' + ${cc.card.name} + (${iter.last} ? '' : ', ')">1x Card</span>
                            </div>
                        </div>

                        <form th:if="${ownTrade and openTrade and offer.status.name() == 'PENDING'}"
                              th:action="@{/trades/{tradeId}/offers/{offerId}/accept(tradeId=${trade.id}, offerId=${offer.id})}"
                              method="post">
                            <button class="btn profile-btn" type="submit">Acceptér</button>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<script>
    (function () {
        const rows = document.getElementById('offerRows');
        const addRowBtn = document.getElementById('addOfferRow');
        if (!rows || !addRowBtn) return;

        function wireRow(row) {
            const remove = row.querySelector('.remove-offer-row');
            remove.addEventListener('click', function () {
                if (rows.children.length <= 1) return;
                row.remove();
            });
        }

        function addRow() {
            const first = rows.querySelector('.offer-row');
            const clone = first.cloneNode(true);
            clone.querySelector('select[name="cardIds"]').selectedIndex = 0;
            clone.querySelector('input[name="quantities"]').value = 1;
            rows.appendChild(clone);
            wireRow(clone);
        }

        wireRow(rows.querySelector('.offer-row'));
        addRowBtn.addEventListener('click', addRow);
    })();
</script>

</body>
</html>
