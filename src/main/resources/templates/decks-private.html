<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title>Private decks - DeckForge</title>
</head>
<body>

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main>
    <section class="profile-card decks-card">
        <h1 th:text="${profile.displayName} + 's decks'">Brugers decks</h1>
        <p class="decks-empty">Denne brugers decks er private.</p>
        <a th:href="@{/profile/{id}(id=${profile.userId})}" class="btn profile-btn">Tilbage</a>
    </section>
</main>

</body>
</html>
