<nav class="navbar" th:fragment="navbar">
    <div class="logo">
        <img th:src="@{/images/deckforgelogo.png}" alt="DeckForge">
    </div>

    <div class="nav-links" aria-label="Primær navigation">
        <div class="nav-primary">
            <a th:href="@{/collection}"
               th:classappend="${#strings.startsWith(currentPath, '/collection') || (#strings.startsWith(currentPath, '/profile/') && #strings.contains(currentPath, '/collection'))} ? 'active'">Samling</a>
            <a th:href="@{/decks}"
               th:classappend="${#strings.startsWith(currentPath, '/decks') || #strings.startsWith(currentPath, '/deck-builder') || (#strings.startsWith(currentPath, '/profile/') && #strings.contains(currentPath, '/decks'))} ? 'active'">Decks</a>
            <a th:href="@{/events}"
               th:classappend="${#strings.startsWith(currentPath, '/events')} ? 'active'">Events</a>
            <a th:href="@{/trades}"
               th:classappend="${#strings.startsWith(currentPath, '/trades')} ? 'active'">Bytning</a>
        </div>

        <div class="nav-secondary" aria-label="Sekundær navigation">
            <a th:href="@{/card-db}" th:classappend="${#strings.startsWith(currentPath, '/card-db') || #strings.startsWith(currentPath, '/create-card')} ? 'active'">Kortdatabase</a>
            <a th:href="@{/profile}" th:classappend="${#strings.equals(currentPath, '/profile') || #strings.startsWith(currentPath, '/profile/debug')} ? 'active'">Profil</a>
        </div>
    </div>
</nav>
