<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title>Siden findes ikke - DeckForge</title>
</head>
<body>

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main>
    <section class="error-card">
        <span class="error-code">404</span>
        <h1>Siden findes ikke</h1>
        <p>Den side du leder efter er ikke bygget endnu, eller også findes den ikke længere.</p>
        <div class="error-actions">
            <a class="btn profile-btn" th:href="@{/profile}">Til profil</a>
            <a class="btn profile-btn" th:href="@{/}">Forside</a>
        </div>
    </section>
</main>

</body>
</html>
