<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/card-db.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title>Samling - DeckForge</title>
</head>
<body class="card-db collection">

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main class="page">

    <section class="panel">
        <h1>
            <span th:text="${profile.displayName}">Bruger</span>
            <span>s samling</span>
        </h1>

        <form th:action="${collectionAction}" method="get" th:object="${filter}" class="form">
            <div class="form-row">
                <label for="name">Navn</label>
                <input id="name" type="text" th:field="*{name}">
            </div>

            <div class="form-row">
                <label for="cardSet">Set</label>
                <input id="cardSet" type="text" th:field="*{cardSet}">
            </div>

            <div class="form-row">
                <label for="mana">Mana</label>
                <input id="mana" type="text" th:field="*{mana}">
            </div>

            <div class="form-row-3">
                <div class="form-row">
                    <label for="rarity">Rarity</label>
                    <select id="rarity" th:field="*{rarity}">
                        <option value="">(none)</option>
                        <option th:each="r : ${rarities}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="cardType">Type</label>
                    <select id="cardType" th:field="*{cardType}">
                        <option value="">(none)</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="color">Color</label>
                    <select id="color" th:field="*{color}">
                        <option value="">(none)</option>
                        <option th:each="c : ${colors}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn" type="submit">Søg / filtrer</button>
                <a class="btn" th:href="${collectionAction}">Nulstil</a>
            </div>
        </form>
    </section>

    <section class="panel">
        <h2>Kort</h2>

        <p class="message message-success" th:if="${success}" th:text="${success}">Kortet er fjernet.</p>

        <div class="card-image-grid" th:if="${!#lists.isEmpty(cards)}">
            <div class="card-image-tile collection-card-tile" th:each="collectionCard : ${cards}">
                <button class="card-preview-button"
                        type="button"
                        th:attr="data-dialog-id='collection-card-preview-' + ${collectionCard.card.id}"
                        aria-label="Vis kort større">
                    <img th:if="${collectionCard.card.imageUrl}"
                         th:src="${collectionCard.card.imageUrl}"
                         th:alt="${collectionCard.card.name}"
                         loading="lazy">
                </button>
                <form class="remove-card-form"
                      th:if="${canEditCollection}"
                      th:action="@{/collection/{cardId}/remove(cardId=${collectionCard.card.id})}"
                      method="post">
                    <button class="remove-card-button" type="submit" aria-label="Fjern kort fra samling" title="Fjern kort fra samling">-</button>
                </form>
                <span class="collection-quantity"
                      th:if="${collectionCard.quantity > 1}"
                      th:text="'x' + ${collectionCard.quantity}">x2</span>
                <dialog class="card-preview-dialog" th:id="'collection-card-preview-' + ${collectionCard.card.id}">
                    <button class="card-preview-close" type="button" aria-label="Luk">x</button>
                    <div class="card-preview-content">
                        <img class="card-preview-image"
                             th:if="${collectionCard.card.imageUrl}"
                             th:src="${collectionCard.card.imageUrl}"
                             th:alt="${collectionCard.card.name}">
                        <div class="card-preview-details">
                            <h3 th:text="${collectionCard.card.name}">Card Name</h3>
                            <dl>
                                <div>
                                    <dt>Copies</dt>
                                    <dd th:text="${collectionCard.quantity}">1</dd>
                                </div>
                                <div>
                                    <dt>Set</dt>
                                    <dd th:text="${collectionCard.card.cardSet} ?: '-'">Set</dd>
                                </div>
                                <div>
                                    <dt>Rarity</dt>
                                    <dd th:text="${collectionCard.card.rarity} ?: '-'">COMMON</dd>
                                </div>
                                <div>
                                    <dt>Type</dt>
                                    <dd th:text="${collectionCard.card.cardType} ?: '-'">CREATURE</dd>
                                </div>
                                <div>
                                    <dt>Color</dt>
                                    <dd th:text="${collectionCard.card.color} ?: '-'">GREEN</dd>
                                </div>
                                <div>
                                    <dt>Mana</dt>
                                    <dd th:text="${collectionCard.card.mana} ?: '-'">1G</dd>
                                </div>
                            </dl>
                            <p class="card-preview-description"
                               th:if="${collectionCard.card.description}"
                               th:text="${collectionCard.card.description}">Description</p>
                        </div>
                    </div>
                </dialog>
            </div>
        </div>

        <p class="collection-empty" th:if="${#lists.isEmpty(cards)}">Ingen kort i samlingen.</p>
    </section>
</main>

<script>
    document.querySelectorAll(".card-preview-button").forEach((button) => {
        button.addEventListener("click", () => {
            document.getElementById(button.dataset.dialogId)?.showModal();
        });
    });

    document.querySelectorAll(".card-preview-dialog").forEach((dialog) => {
        dialog.addEventListener("click", (event) => {
            if (event.target === dialog) {
                dialog.close();
            }
        });

        dialog.querySelector(".card-preview-close")?.addEventListener("click", () => dialog.close());
    });
</script>

</body>
</html>
