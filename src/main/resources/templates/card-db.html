<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/card-db.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <title>Kortdatabase - DeckForge</title>
</head>
<body class="card-db">

<header>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main class="page">

    <section class="panel">
        <div class="panel-header">
            <h1>Kortdatabase</h1>
            <a class="btn panel-action" th:href="@{/create-card}">Opret kort</a>
        </div>

        <form th:action="@{/card-db}" method="get" th:object="${filter}" class="form">
            <div class="form-row">
                <label for="name">Navn</label>
                <input id="name" type="text" th:field="*{name}">
            </div>

            <div class="form-row">
                <label for="cardSet">Set</label>
                <input id="cardSet" type="text" th:field="*{cardSet}">
            </div>

            <div class="form-row">
                <label for="mana">Mana</label>
                <input id="mana" type="text" th:field="*{mana}">
            </div>

            <div class="form-row-3">
                <div class="form-row">
                    <label for="rarity">Rarity</label>
                    <select id="rarity" th:field="*{rarity}">
                        <option value="">(none)</option>
                        <option th:each="r : ${rarities}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="cardType">Type</label>
                    <select id="cardType" th:field="*{cardType}">
                        <option value="">(none)</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="color">Color</label>
                    <select id="color" th:field="*{color}">
                        <option value="">(none)</option>
                        <option th:each="c : ${colors}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn" type="submit">Søg / filtrer</button>
                <a class="btn" th:href="@{/card-db}">Nulstil</a>
            </div>
        </form>
    </section>

    <section class="panel">
        <h2>Alle kort</h2>

        <p class="message message-success" th:if="${success}" th:text="${success}">Kortet er tilføjet.</p>

        <div class="card-image-grid" th:if="${!#lists.isEmpty(cards)}">
            <div class="card-image-tile card-db-tile" th:each="card : ${cards}">
                <button class="card-preview-button"
                        type="button"
                        th:attr="data-dialog-id='card-preview-' + ${card.id}"
                        aria-label="Vis kort større">
                    <img th:if="${card.imageUrl}" th:src="${card.imageUrl}" th:alt="${card.name}" loading="lazy">
                </button>
                <form class="add-card-form" th:action="@{/card-db/{cardId}/add(cardId=${card.id})}" method="post">
                    <button class="add-card-button" type="submit" aria-label="Tilføj kort til samling" title="Tilføj kort til samling">+</button>
                </form>
                <dialog class="card-preview-dialog" th:id="'card-preview-' + ${card.id}">
                    <button class="card-preview-close" type="button" aria-label="Luk">x</button>
                    <div class="card-preview-content">
                        <img class="card-preview-image" th:if="${card.imageUrl}" th:src="${card.imageUrl}" th:alt="${card.name}">
                        <div class="card-preview-details">
                            <h3 th:text="${card.name}">Card Name</h3>
                            <dl>
                                <div>
                                    <dt>Set</dt>
                                    <dd th:text="${card.cardSet} ?: '-'">Set</dd>
                                </div>
                                <div>
                                    <dt>Rarity</dt>
                                    <dd th:text="${card.rarity} ?: '-'">COMMON</dd>
                                </div>
                                <div>
                                    <dt>Type</dt>
                                    <dd th:text="${card.cardType} ?: '-'">CREATURE</dd>
                                </div>
                                <div>
                                    <dt>Color</dt>
                                    <dd th:text="${card.color} ?: '-'">GREEN</dd>
                                </div>
                                <div>
                                    <dt>Mana</dt>
                                    <dd th:text="${card.mana} ?: '-'">1G</dd>
                                </div>
                            </dl>
                            <p class="card-preview-description" th:if="${card.description}" th:text="${card.description}">Description</p>
                        </div>
                    </div>
                </dialog>
            </div>
        </div>

        <p class="collection-empty" th:if="${#lists.isEmpty(cards)}">Ingen kort endnu.</p>
    </section>
</main>

<script>
    document.querySelectorAll(".card-preview-button").forEach((button) => {
        button.addEventListener("click", () => {
            document.getElementById(button.dataset.dialogId)?.showModal();
        });
    });

    document.querySelectorAll(".card-preview-dialog").forEach((dialog) => {
        dialog.addEventListener("click", (event) => {
            if (event.target === dialog) {
                dialog.close();
            }
        });

        dialog.querySelector(".card-preview-close")?.addEventListener("click", () => dialog.close());
    });
</script>

</body>
</html>
